<DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compagnon - Scrum</title>
    <link rel="stylesheet" href="styles/accueilAdmin.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="javascripts/serviceHttp.js"></script>
    <script src="javascripts/accueilAdmin.js"></script>
</head>
<body>
    <header>
        <h1>Compagnon - Scrum -  Admin Panel</h1>
        <button class="logout">Déconnecter</button>
    </header>
    
    <main>
        <div class="board">
            <div class="column todo">
                <h2>To do</h2>
                <button class="add-task">+ Ajouter une tâche</button>
            </div>
            <div class="column doing">
                <h2>Doing</h2>
                <button class="add-task">+ Ajouter une tâche</button>
            </div>
            <div class="column done">
                <h2>Done</h2>
                <button class="add-task">+ Ajouter une tâche</button>
            </div>
        </div>
    </main>
</body>
</html>
