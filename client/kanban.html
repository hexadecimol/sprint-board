<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="styles/kanban.css">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="javascripts/serviceHttp.js"></script>
  <script src="javascripts/connectivity.js" defer></script>
  <script src="javascripts/kanban.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').then(function (reg) {
            // registration worked
            console.log('Registration succeeded. Scope is ' + reg.scope);
        }).catch(function (error) {
            // registration failed
            console.log('Registration failed with ' + error);
        });
    };
</script>
  <link rel="manifest" href="manifest.json">
  <title>Sprint Board – Vos Kanbans</title>
</head>
<body>
  <header>

    <div class="logo">
      <img src="images/logoSprintBoard.png" alt="Sprint Board Logo" />
      <div class="logo-text">
        Sprint<br />Board
      </div>
      
    </div>
    <div class="hello"><strong>CHARGEMENT...</strong></div>
    <div>
      <button class="logout" onClick="kanbanInstance.logout()">Déconnecter</button>
    </div>
  </header>

  <main>
    <section class="kanban-header">
      <h2>Voici vos Kanbans</h2>
      <button class="btn-create" onClick="kanbanInstance.createKanban()">+ Nouveau Kanban</button>
    </section>

    <section class="kanban-grid">
      
    </section>
  </main>

</body>
</html>
